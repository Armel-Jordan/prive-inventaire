version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
      buildSpec: |
        customHeaders:
          - pattern: '**/*'
            headers:
              - key: 'Access-Control-Allow-Origin'
                value: '*'
    appRoot: prise-inventaire-web
