name: Backend CD — Deploy DigitalOcean

on:
  push:
    branches: [main]
    paths:
      - 'prise-inventaire-api/**'
      - '.github/workflows/backend-cd.yml'
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ─── ÉTAPE 1 : Vérifications avant déploiement ───────────────────────────
  verify:
    name: Vérifications pré-déploiement
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: prise_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    defaults:
      run:
        working-directory: prise-inventaire-api

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, pdo, pdo_mysql
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: prise-inventaire-api/vendor
          key: composer-${{ hashFiles('prise-inventaire-api/composer.lock') }}
          restore-keys: composer-

      - name: Installer les dépendances
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Lint (Laravel Pint)
        run: ./vendor/bin/pint --test

      - name: Configurer l'environnement de test
        run: |
          cp .env.example .env.testing
          echo "APP_ENV=testing" >> .env.testing
          echo "DB_CONNECTION=mysql" >> .env.testing
          echo "DB_HOST=127.0.0.1" >> .env.testing
          echo "DB_PORT=3306" >> .env.testing
          echo "DB_DATABASE=prise_test" >> .env.testing
          echo "DB_USERNAME=root" >> .env.testing
          echo "DB_PASSWORD=root" >> .env.testing
          php artisan key:generate --env=testing

      - name: Migrations de test
        run: php artisan migrate --env=testing --force

      - name: Tests PHPUnit
        run: php artisan test --env=testing

      - name: Résumé des vérifications
        run: |
          echo "✅ Lint OK"
          echo "✅ Migrations OK"
          echo "✅ Tests OK"
          echo "Prêt pour déploiement en production"

  # ─── ÉTAPE 2 : Déploiement ───────────────────────────────────────────────
  deploy:
    name: Deploy to DigitalOcean
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e

            echo "=== Déploiement Prise Inventaire API ==="
            cd /var/www/prise-api/prise-inventaire-api

            echo "--- Pull du code ---"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "--- Installation des dépendances ---"
            composer install --no-dev --optimize-autoloader --no-interaction

            echo "--- Mise en maintenance ---"
            php artisan down --retry=60

            echo "--- Migrations ---"
            php artisan migrate --force

            echo "--- Vider les caches ---"
            php artisan config:clear
            php artisan cache:clear
            php artisan route:clear
            php artisan view:clear

            echo "--- Optimiser pour la production ---"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "--- Permissions fichiers ---"
            chown -R www-data:www-data storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            echo "--- Redémarrer PHP-FPM ---"
            systemctl restart php8.3-fpm

            echo "--- Sortie de maintenance ---"
            php artisan up

            echo "=== Déploiement terminé avec succès ==="

      - name: Vérifier la santé de l'API
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.DO_HOST }}/api/health || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "ERREUR: API status $STATUS"
            exit 1
          fi
          echo "✅ API opérationnelle"

      - name: Notifier en cas d'échec
        if: failure()
        run: |
          echo "Déploiement échoué."
          echo "Logs: ssh root@${{ secrets.DO_HOST }} 'tail -f /var/www/prise-api/prise-inventaire-api/storage/logs/laravel.log'"
